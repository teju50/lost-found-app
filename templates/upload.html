<!DOCTYPE html>
<html>
<head>
    <title>Upload Item</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #eef2f7;
            margin: 0;
        }

        .header {
            background: #4a90e2;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .container {
            width: 90%;
            max-width: 500px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .btn {
            width: 100%;
            padding: 10px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn:hover {
            background: #357abd;
        }

        .back {
            display: block;
            margin-top: 10px;
            text-align: center;
            text-decoration: none;
            color: #4a90e2;
        }
    </style>
</head>

<body>

<div class="header">📤 Upload Item</div>

<div class="container">
    <form method="POST" enctype="multipart/form-data">

        <input type="text" name="title" placeholder="Item Name" required>

        <select name="type">
            <option value="lost">Lost</option>
            <option value="found">Found</option>
        </select>

        <input type="text" name="location" placeholder="Location" required>

        <input type="text" name="contact" placeholder="Contact Number" required>

        <input type="file" name="image" required>

        <button class="btn">Upload</button>
    </form>

    <a href="/items" class="back">⬅ Back to Items</a>
</div>

</body>
</html>
