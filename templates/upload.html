<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Upload Item</title>
<style>
body{background:#0f172a;color:white;font-family:Poppins;}
.form{max-width:500px;margin:auto;padding:20px;}
input,textarea,select{width:100%;padding:10px;margin:10px 0;border:none;border-radius:8px;}
button{width:100%;padding:10px;background:#2563eb;color:white;border:none;border-radius:8px;}
</style>
</head>
<body>
<div class="form">
<h2>Upload Item</h2>
<input placeholder="Title">
<textarea placeholder="Description"></textarea>
<input placeholder="Location">
<input placeholder="Contact">
<select>
<option>Lost</option>
<option>Found</option>
</select>
<input type="file">
<button>Submit</button>
</div>
</body>
</html>
