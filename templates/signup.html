<!DOCTYPE html>
<html>
<head>
<title>Back2You - Sign Up</title>

<style>
body {
    font-family: 'Segoe UI';
    background: linear-gradient(to right, #43e97b, #38f9d7);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.box {
    background:white;
    padding:40px;
    border-radius:15px;
    width:320px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
input {
    width:90%;
    padding:12px;
    margin:10px;
    border-radius:8px;
}
button {
    width:100%;
    padding:12px;
    background:#43e97b;
    border:none;
    color:white;
    border-radius:8px;
}
</style>

</head>

<body>

<div class="box">
<h2>Create Account 📝</h2>

<form method="POST">
<input name="username" placeholder="Username">
<input name="password" type="password" placeholder="Password">
<button>Sign Up</button>
</form>

<p><a href="/">Back to Login</a></p>
</div>

</body>
</html>
