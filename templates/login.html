<!DOCTYPE html>
<html>
<head>
<title>Back2You</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #4a90e2, #6fb1fc);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.box {
    background: white;
    padding: 40px;
    border-radius: 15px;
    width: 320px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}
h2 {
    font-size: 28px;
}
input {
    width: 90%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}
button {
    width: 100%;
    padding: 12px;
    background: #4a90e2;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
}
a {
    color: #4a90e2;
}
</style>

</head>

<body>

<div class="box">
<h2>Back2You 🔍</h2>
<p>Find what you lost</p>

<form method="POST">
<input name="username" placeholder="Username">
<input name="password" type="password" placeholder="Password">
<button>Login</button>
</form>

<p>New user? <a href="/signup">Sign Up</a></p>

</div>

</body>
</html>
