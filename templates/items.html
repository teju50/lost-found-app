<!DOCTYPE html>
<html>
<head>
    <title>All Items</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #eef2f7;
            margin: 0;
        }

        .header {
            background: #4a90e2;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        .container {
            width: 90%;
            max-width: 800px;
            margin: 20px auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .search-box {
            padding: 8px;
            width: 60%;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            background: #4a90e2;
            color: white;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
        }

        .btn:hover {
            background: #357abd;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            gap: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .card img {
            width: 120px;
            height: 120px;
            border-radius: 10px;
            object-fit: cover;
        }

        .details h3 {
            margin: 0;
            color: #333;
        }

        .details p {
            margin: 5px 0;
            color: #555;
            font-size: 14px;
        }

        .actions {
            margin-top: 10px;
        }

        .edit {
            background: #28a745;
        }

        .delete {
            background: #dc3545;
        }
    </style>
</head>

<body>

<div class="header">
    📱 Lost & Found
    <a href="/logout" style="float:right; color:white; text-decoration:none;">Logout</a>
</div>
<div class="container">

    <div class="top-bar">
        <form action="/search">
            <input type="text" name="q" placeholder="Search items..." class="search-box">
            <button class="btn">Search</button>
        </form>

        <a href="/upload" class="btn">+ Upload</a>
    </div>

    {% for item in items %}
        <div class="card">
            <img src="{{ url_for('static', filename=item.image) }}">

            <div class="details">
                <h3>{{ item.title }}</h3>
                <p><b>Type:</b> {{ item.type }}</p>
                <p><b>Location:</b> {{ item.location }}</p>
                <p><b>Contact:</b> {{ item.contact }}</p>

                <div class="actions">
                    <a href="/edit/{{ item.id }}" class="btn edit">Edit</a>
                    <a href="/delete/{{ item.id }}" class="btn delete">Delete</a>
                </div>
            </div>
        </div>
    {% endfor %}

</div>

</body>
</html>
